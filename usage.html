<h1>📋 使い方</h1><h2>冷蔵庫タブ</h2><p>「食材を追加」ボタンでカテゴリ・名前・賞味期限・保存場所を登録。期限が近い順に並び、色分けで一目でわかります。</p><h2>レシピタブ</h2><p>登録済みの食材カテゴリから作れるレシピ候補を自動表示します。</p><h2>買い物リストタブ</h2><p>次回購入する食材をリスト化。チェックをつけて管理できます。</p>
